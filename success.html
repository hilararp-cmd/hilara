<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>HILARA | Pago Confirmado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-light">
    <div class="max-w-md border border-white/10 p-10 backdrop-blur-md">
        <h1 class="italic text-4xl mb-6 font-serif text-[#AF9662]">¡Pago Confirmado!</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mb-10 leading-loose uppercase">Redirigiendo a WhatsApp para finalizar el envío...</p>
        <button id="wa-btn" class="px-10 py-4 border border-[#AF9662] text-[#AF9662] text-[10px] tracking-widest uppercase">WhatsApp ahora</button>
    </div>
    <script>
        const url = sessionStorage.getItem('pendingWA');
        if(url) {
            setTimeout(() => { window.location.href = url; }, 3000);
            document.getElementById('wa-btn').onclick = () => { window.location.href = url; };
        }
    </script>
</body>
</html>
